[project]
name = "roder-python-chat-provider"
version = "0.1.0"
description = "Roder process-hosted Python OpenAI-compatible chat-completions provider POC"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/roder_python_chat_provider"]

[tool.pytest.ini_options]
testpaths = ["tests"]
