id = "python-tools"
name = "Python Tools"
version = "0.1.0"
api_version = "^0.1"
description = "Process-hosted stdlib-only Python tool provider example"

[launch]
command = "python3"
args = ["main.py"]

[[provides]]
type = "tool_provider"
id = "python-tools"
tools = [
  { name = "word_count", description = "Count whitespace-separated words in the given text.", parameters = { type = "object", properties = { text = { type = "string", description = "Text to count words in." } }, required = ["text"] } },
]
