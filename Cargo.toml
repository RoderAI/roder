[workspace]
members = [
    "crates/*",
]
resolver = "3"

[workspace.package]
edition = "2024"
authors = ["Pandelis Zembashis"]
description = "Agentic software development tools and SDKs for Roder."
license = "MIT"
repository = "https://github.com/RoderAI/roder"
readme = "README.md"

