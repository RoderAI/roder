[project]
name = "roder-sdk"
version = "0.0.0"
requires-python = ">=3.10"
dependencies = [
  "anyio>=4.0",
  "websockets>=14.0",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pyright>=1.1.390",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.10"
include = ["src"]
typeCheckingMode = "basic"
