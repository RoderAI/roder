[package]
name = "roder-ext-opencode"
version.workspace = true
edition.workspace = true

[package.metadata.roder.distribution]
id = "opencode"
category = "inference-engine"
display_name = "OpenCode"
description = "OpenCode Zen and OpenCode Go subscription inference providers."
default_in_profiles = ["full", "research-headless"]
required_env = []
optional_env = ["OPENCODE_API_KEY", "OPENCODE_ZEN_API_KEY", "RODER_OPENCODE_API_KEY", "OPENCODE_GO_API_KEY", "RODER_OPENCODE_GO_API_KEY", "OPENCODE_BASE_URL", "OPENCODE_ZEN_BASE_URL", "RODER_OPENCODE_BASE_URL", "OPENCODE_GO_BASE_URL", "RODER_OPENCODE_GO_BASE_URL", "RODER_OPENCODE_MODELS_CACHE_TTL_SECONDS", "RODER_OPENCODE_MODELS_REFRESH", "RODER_MODELS_CACHE_PATH"]
conflicts_with = []
required_capabilities = ["network.opencode.ai"]
extension_path = "::OpenCodeExtension::new"
docs_url = "https://opencode.ai/auth"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
dirs.workspace = true
reqwest = { workspace = true, features = ["json"] }
roder-api.workspace = true
roder-config.workspace = true
roder-ext-openai-responses.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["full"] }
