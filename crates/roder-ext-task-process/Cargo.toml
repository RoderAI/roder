[package]
name = "roder-ext-task-process"
version = "0.1.2"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "task-process"
category = "tool-provider"
display_name = "Process Tasks"
description = "Background task executor backed by local processes."
default_in_profiles = ["full", "research-headless"]
required_env = []
optional_env = []
conflicts_with = []
required_capabilities = ["process.spawn.shell"]
extension_path = "::ProcessTaskExtension"
docs_url = ""

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
libc.workspace = true
roder-api.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
time.workspace = true
tokio.workspace = true

[dev-dependencies]
roder-ext-runner-unix-local.workspace = true
roder-tasks = { path = "../roder-tasks" }
uuid = { workspace = true, features = ["v4"] }
