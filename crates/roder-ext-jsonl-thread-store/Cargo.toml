[package]
name = "roder-ext-jsonl-thread-store"
version = "0.1.2"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "jsonl-thread-store"
category = "thread-store"
display_name = "JSONL Thread Store"
description = "Durable local JSONL thread persistence."
default_in_profiles = ["full", "minimal", "openai-only", "anthropic-only", "research-headless"]
required_env = []
optional_env = []
conflicts_with = []
required_capabilities = ["fs.readwrite.roder-home"]
extension_path = "::JsonlThreadStoreExtension::new"
docs_url = ""

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
roder-api.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
time = { workspace = true, features = ["serde-well-known"] }
tokio.workspace = true
uuid = { workspace = true, features = ["v4"] }
