[package]
name = "roder-ext-vertex"
version = "0.1.0"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "vertex"
category = "inference-engine"
display_name = "Google Vertex AI"
description = "Gemini on Vertex AI with service-account OAuth, streaming text and tool calls."
default_in_profiles = []
required_env = []
optional_env = ["GOOGLE_APPLICATION_CREDENTIALS", "VERTEX_CREDENTIALS_JSON", "VERTEX_PROJECT", "VERTEX_LOCATION"]
conflicts_with = []
required_capabilities = ["network.api.vertexai", "secret.read.GOOGLE_APPLICATION_CREDENTIALS", "secret.read.VERTEX_CREDENTIALS_JSON"]
extension_path = "::VertexExtension::new"
docs_url = "https://docs.cloud.google.com/vertex-ai/generative-ai/docs"

[dependencies]
anyhow.workspace = true
async-stream.workspace = true
async-trait.workspace = true
base64.workspace = true
bytes.workspace = true
futures.workspace = true
reqwest = { workspace = true, features = ["json", "stream"] }
ring = "0.17"
roder-api.workspace = true
rustls-pemfile.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio.workspace = true
