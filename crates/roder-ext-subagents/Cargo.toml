[package]
name = "roder-ext-subagents"
version = "0.1.4"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "subagents"
category = "context-planner"
display_name = "Subagents"
description = "In-process subagent dispatcher and context integration."
default_in_profiles = ["full", "research-headless"]
required_env = []
optional_env = []
conflicts_with = []
required_capabilities = ["process.spawn.roder"]
extension_path = "::extension"
docs_url = ""

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
futures.workspace = true
roder-api.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
time = { workspace = true, features = ["serde"] }
tokio.workspace = true
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
# `test-util` enables `tokio::time::pause`/`advance` so the agent-swarm
# rate-limit governor's shrink/recovery windows are tested on a fake clock.
tokio = { workspace = true, features = ["test-util"] }
