[package]
name = "roder-ext-openai-responses"
version = "0.1.5"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "openai-responses"
category = "inference-engine"
display_name = "OpenAI Responses"
description = "OpenAI Responses-style inference with reasoning summaries and tool calls."
default_in_profiles = ["full", "openai-only", "research-headless"]
required_env = ["OPENAI_API_KEY"]
optional_env = ["OPENAI_BASE_URL", "RODER_MODELS_CACHE_PATH", "RODER_MODELS_CACHE_TTL_SECONDS", "RODER_MODELS_REFRESH", "RODER_RESPONSES_STREAM_IDLE_TIMEOUT_MS"]
conflicts_with = []
required_capabilities = ["network.api.openai.com", "secret.read.OPENAI_API_KEY"]
extension_path = "::OpenAiResponsesExtension::new"
docs_url = "https://platform.openai.com/docs/api-reference/responses"

[dependencies]
anyhow.workspace = true
async-stream.workspace = true
async-trait.workspace = true
futures.workspace = true
dirs.workspace = true
reqwest = { workspace = true, features = ["json", "stream"] }
roder-api.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio.workspace = true
