[package]
name = "roder-ext-perplexity-search"
version = "0.1.1"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "perplexity-search"
category = "tool-provider"
display_name = "Perplexity Search"
description = "Perplexity-backed web search tools."
default_in_profiles = []
required_env = ["PERPLEXITY_API_KEY"]
optional_env = []
conflicts_with = []
required_capabilities = ["network.api.perplexity.ai", "secret.read.PERPLEXITY_API_KEY"]
extension_path = "::PerplexitySearchExtension::new"
docs_url = "https://docs.perplexity.ai"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
reqwest = { workspace = true, features = ["json"] }
roder-api.workspace = true
roder-web-search.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[dev-dependencies]
tokio.workspace = true
