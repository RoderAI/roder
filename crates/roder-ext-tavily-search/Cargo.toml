[package]
name = "roder-ext-tavily-search"
version = "0.1.1"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "tavily-search"
category = "tool-provider"
display_name = "Tavily Search"
description = "Tavily-backed web search tools."
default_in_profiles = []
required_env = ["TAVILY_API_KEY"]
optional_env = []
conflicts_with = []
required_capabilities = ["network.api.tavily.com", "secret.read.TAVILY_API_KEY"]
extension_path = "::TavilySearchExtension::new"
docs_url = "https://docs.tavily.com"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
reqwest = { workspace = true, features = ["json"] }
roder-api.workspace = true
roder-web-search.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[dev-dependencies]
tokio.workspace = true
