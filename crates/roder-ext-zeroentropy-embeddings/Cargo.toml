[package]
name = "roder-ext-zeroentropy-embeddings"
version.workspace = true
edition.workspace = true

[package.metadata.roder.distribution]
id = "zeroentropy-embeddings"
category = "embedding-provider"
display_name = "ZeroEntropy Embeddings"
description = "ZeroEntropy zembed-1 embedding provider for Roder memories."
default_in_profiles = ["full", "research-headless"]
required_env = []
optional_env = ["RODER_ZEROENTROPY_API_KEY", "ZEROENTROPY_API_KEY", "RODER_ZEROENTROPY_EMBEDDINGS_ENDPOINT"]
conflicts_with = []
required_capabilities = ["network.api.zeroentropy.dev", "secret.read.zeroentropy_api_key"]
extension_path = "::extension"
docs_url = "https://docs.zeroentropy.dev/api-reference/models/embed"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
base64.workspace = true
reqwest.workspace = true
roder-api.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[dev-dependencies]
tokio.workspace = true
