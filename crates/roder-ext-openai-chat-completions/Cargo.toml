[package]
name = "roder-ext-openai-chat-completions"
version = "0.1.1"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "openai-chat-completions"
category = "inference-engine"
display_name = "OpenAI Chat Completions"
description = "OpenAI-compatible Chat Completions inference."
default_in_profiles = []
required_env = ["OPENAI_API_KEY"]
optional_env = ["OPENAI_BASE_URL"]
conflicts_with = []
required_capabilities = ["network.api.openai.com", "secret.read.OPENAI_API_KEY"]
extension_path = "::OpenAiChatCompletionsExtension::new"
docs_url = "https://platform.openai.com/docs/api-reference/chat"

[dependencies]
anyhow.workspace = true
async-stream.workspace = true
async-trait.workspace = true
futures.workspace = true
reqwest = { workspace = true, features = ["json", "stream"] }
roder-api.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio.workspace = true
