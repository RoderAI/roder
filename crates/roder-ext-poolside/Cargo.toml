[package]
name = "roder-ext-poolside"
version = "0.1.0"
edition.workspace = true

[package.metadata.roder.distribution]
id = "poolside"
category = "inference-engine"
display_name = "Poolside"
description = "Poolside Laguna API-key inference provider."
default_in_profiles = ["full", "research-headless"]
required_env = []
optional_env = ["POOLSIDE_API_KEY", "RODER_POOLSIDE_API_KEY", "POOLSIDE_BASE_URL", "RODER_POOLSIDE_BASE_URL", "RODER_MODELS_CACHE_PATH", "RODER_MODELS_CACHE_TTL_SECONDS", "RODER_MODELS_REFRESH"]
conflicts_with = []
required_capabilities = ["network.inference.poolside.ai"]
extension_path = "::PoolsideExtension::new"
docs_url = "https://platform.poolside.ai/api-keys"

[dependencies]
anyhow.workspace = true
async-stream.workspace = true
async-trait.workspace = true
dirs.workspace = true
futures.workspace = true
reqwest = { workspace = true, features = ["json", "stream"] }
roder-api.workspace = true
roder-config.workspace = true
semver.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio.workspace = true
