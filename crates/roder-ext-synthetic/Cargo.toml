[package]
name = "roder-ext-synthetic"
version = "0.1.1"
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[package.metadata.roder.distribution]
id = "synthetic"
category = "inference-engine"
display_name = "Synthetic"
description = "Synthetic API-key inference provider using OpenAI-compatible Chat Completions."
default_in_profiles = []
required_env = []
optional_env = [
    "SYNTHETIC_API_KEY",
    "RODER_SYNTHETIC_API_KEY",
    "SYNTHETIC_BASE_URL",
    "SYNTHETIC_OPENAI_BASE_URL",
    "RODER_SYNTHETIC_BASE_URL",
]
conflicts_with = []
required_capabilities = ["network.api.synthetic.new"]
extension_path = "::SyntheticExtension::new"
docs_url = "https://dev.synthetic.new/docs/openai/chat-completions"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
roder-api.workspace = true
roder-config.workspace = true
roder-ext-openai-chat-completions.workspace = true
roder-ext-openai-responses.workspace = true
semver.workspace = true
tokio = { workspace = true, features = ["rt", "macros"] }

[dev-dependencies]
futures.workspace = true
reqwest = { workspace = true, features = ["json"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["rt", "macros", "io-util", "net", "sync"] }
