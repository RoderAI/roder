[package]
name = "roder-ext-memory"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
roder-api = { path = "../roder-api" }
async-trait = "0.1"
semver = "1.0"
uuid = { version = "1.10", features = ["v4"] }
time = { version = "0.3", features = ["serde"] }
