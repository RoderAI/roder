name: Changeset gate

# Automatic PR checks disabled until GitHub Actions billing / paid runners are
# available. Re-enable the pull_request trigger below when CI can run again.
# Local gate: python3 scripts/check-changesets.py --base origin/master
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changeset-gate:
    name: Require changesets for changed packages
    runs-on: ubuntu-latest
    if: false # keep job definition for manual re-enable; see on: above
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check knope.toml is up to date
        run: python3 scripts/generate-knope-config.py --check

      - name: Check changesets cover changed packages
        run: python3 scripts/check-changesets.py --base "origin/${{ github.base_ref }}"
