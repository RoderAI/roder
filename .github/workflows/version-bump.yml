name: Version bump

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check workspace version bump
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            scripts/check-version-bump.sh "origin/${{ github.base_ref }}"
          else
            scripts/check-version-bump.sh "${{ github.event.before }}"
          fi

