name: Release-plz

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'PandelisZ' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain and linker
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Run release-plz
        uses: release-plz/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'PandelisZ' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain and linker
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Run release-plz
        uses: release-plz/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
