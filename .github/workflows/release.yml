name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  release:
    name: Tag and publish GitHub releases
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'RoderAI' &&
      github.head_ref == 'knope/release' &&
      github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install knope
        uses: knope-dev/action@v2.1.2
        with:
          version: 0.23.0

      - name: Run knope release
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-binaries:
    name: Build signed release binaries
    runs-on: ${{ matrix.runner }}
    needs: release
    if: >-
      github.repository_owner == 'RoderAI' &&
      github.head_ref == 'knope/release' &&
      github.event.pull_request.merged == true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "1.95.0" --profile minimal
          rustup default "1.95.0"
          rustup target add "${{ matrix.target }}"

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake lld pkg-config

      - name: Build Roder CLI
        shell: bash
        run: cargo build --release -p roder --bin roder --target "${{ matrix.target }}"

      - name: Install Anchore Quill
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/quill/main/install.sh | sh -s -- -b "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Sign and notarize macOS CLI
        if: runner.os == 'macOS'
        shell: bash
        env:
          QUILL_SIGN_P12: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.APPLE_NOTARIZE_KEY_BASE64 }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARIZE_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARIZE_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in QUILL_SIGN_P12 QUILL_SIGN_PASSWORD QUILL_NOTARY_KEY QUILL_NOTARY_KEY_ID QUILL_NOTARY_ISSUER; do
            if [[ -z "${!name:-}" ]]; then
              echo "${name} secret is required for macOS signing and notarization" >&2
              exit 1
            fi
          done
          binary="target/${{ matrix.target }}/release/roder"
          if codesign -dvv "$binary" >/dev/null 2>&1; then
            codesign --remove-signature "$binary"
          fi
          quill sign-and-notarize \
            --entitlements .github/roder-darwin-signing-entitlements.plist \
            "$binary"

      - name: Package binary archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          staging="$(mktemp -d)"
          trap 'rm -rf "$staging"' EXIT
          archive_base="roder-${{ matrix.target }}"
          mkdir -p "$staging/$archive_base"
          cp "target/${{ matrix.target }}/release/roder" "$staging/$archive_base/roder"
          if [[ "${RUNNER_OS}" != "macOS" ]]; then
            strip "$staging/$archive_base/roder" 2>/dev/null || true
          fi
          chmod 0755 "$staging/$archive_base/roder"
          printf "roder %s\n\nInstall:\n  install -m 0755 roder /usr/local/bin/roder\n" "${{ matrix.target }}" > "$staging/$archive_base/README.txt"
          tar -C "$staging" -czf "dist/release/${archive_base}.tar.gz" "$archive_base"
          (
            cd "dist/release"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${archive_base}.tar.gz" > "${archive_base}.tar.gz.sha256"
            else
              shasum -a 256 "${archive_base}.tar.gz" > "${archive_base}.tar.gz.sha256"
            fi
          )

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: roder-${{ matrix.target }}-release
          path: dist/release/*
          if-no-files-found: error

  upload-release-binaries:
    name: Upload release binaries
    runs-on: ubuntu-latest
    needs: release-binaries
    if: >-
      github.repository_owner == 'RoderAI' &&
      github.head_ref == 'knope/release' &&
      github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Resolve roder release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version[[:space:]]*=' crates/roder-cli/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=roder/v${version}" >> "$GITHUB_OUTPUT"

      - name: Upload binaries to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.release.outputs.tag }}" dist/release/* --clobber

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [release, upload-release-binaries]
    # Runs in the same workflow as `knope release` (so it is not blocked by the
    # GITHUB_TOKEN "no chained workflow" rule) and syncs RoderAI/homebrew-tap to
    # the latest released `roder` CLI version so `brew install` stays current.
    if: >-
      github.repository_owner == 'RoderAI' &&
      github.head_ref == 'knope/release' &&
      github.event.pull_request.merged == true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Update Homebrew tap formula
        env:
          # PAT (or fine-grained token) with `contents: write` on the tap repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/update-homebrew-tap.sh
